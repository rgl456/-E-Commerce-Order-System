server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/

  server:
    eviction-interval-timer-in-ms: 10000
    enable-self-preservation: false

management:
  endpoints:
    web:
      exposure:
        include: health, info